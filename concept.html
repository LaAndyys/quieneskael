<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería concept</title>
    
    <link rel="stylesheet" href="styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Passion+One:wght@400;700&display=swap" rel="stylesheet">
</head>
<!-- Barra de navegación superior -->
    <header class="main-navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="index.html">Mi Galería</a>
            </div>
            <nav class="nav-links">
                <a href="index.html" class="nav-item">Inicio</a>
                <a href="concept.html" class="nav-item">Concept</a>
                <a href="historia.html" class="nav-item">Historia</a>
            </nav>
        </div>
    </header>
<body class="history-page">

    <!-- Botón para volver al inicio -->
    <a href="index.html" class="home-button" aria-label="Volver al inicio">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="#ffffff" viewBox="0 0 24 24">
            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
    </a>

    <main>
        <!-- Título de la sección -->
        <h1 class="history-title" style="text-align: center; margin-top: 40px;">GALERÍA</h1>

        <!-- Contenedor de la galería (Organizado en 3 columnas x 4 filas) -->
        <section class="gallery-container">
            
            <!-- FILA 1 -->
            <div class="gallery-item">
                <img src="images/concept1.jpeg" alt="Imagen 1">
            </div>
            <div class="gallery-item">
                <img src="images/concept2.jpeg" alt="Imagen 2">
            </div>
            <div class="gallery-item">
                <img src="images/concept3.jpeg" alt="Imagen 3">
            </div>

            <!-- FILA 2 -->
            <div class="gallery-item">
                <img src="images/concept4.jpeg" alt="Imagen 4">
            </div>
            <div class="gallery-item">
                <img src="images/concept5.jpeg" alt="Imagen 5">
            </div>
            <div class="gallery-item">
                <img src="images/concept6.jpeg" alt="Imagen 6">
            </div>

            <!-- FILA 3 -->
            <div class="gallery-item">
                <img src="images/concept7.jpeg" alt="Imagen 7">
            </div>
            <div class="gallery-item">
                <img src="images/sheet1.jpeg" alt="Imagen 8">
            </div>
            <div class="gallery-item">
                <img src="images/sheet_kael.jpeg" alt="Imagen 9">
            </div>

            <!-- FILA 4 -->
            <div class="gallery-item">
                <img src="images/concept8.jpeg" alt="Imagen 10">
            </div>
            <div class="gallery-item">
                <img src="images/concept9.jpeg" alt="Imagen 11">
            </div>
            <div class="gallery-item">
                <img src="images/concept10.jpeg" alt="Imagen 12">
            </div>

        </section>
    </main>
    <!-- Contenedor flotante para la imagen en pantalla completa -->
    <div id="gallery-lightbox" class="lightbox">
        <span class="lightbox-close">&times;</span>
        <img id="lightbox-img" src="" alt="Imagen ampliada">
    </div>

    <!-- Enlace al script de funcionamiento -->
    <script src="script.js"></script>
</body>
</html>
